<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataStory Color Palette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #ffffff;
      padding: 40px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 600;
      color: #0f172a;
      letter-spacing: -0.02em;
    }

    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .color-row {
      display: flex;
      gap: 0;
    }

    .color-item {
      flex: 1;
      text-align: center;
    }

    .color-swatch {
      height: 80px;
      width: 100%;
    }

    .color-item:first-child .color-swatch {
      border-radius: 8px 0 0 8px;
    }

    .color-item:last-child .color-swatch {
      border-radius: 0 8px 8px 0;
    }

    .color-hex {
      margin-top: 8px;
      font-size: 10px;
      color: #64748b;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* Typography Section */
    .font-section {
      margin-bottom: 28px;
    }

    .font-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 24px;
      max-width: 400px;
    }

    .font-preview {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 32px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .font-name {
      font-size: 13px;
      font-weight: 600;
      color: #0f172a;
      margin-bottom: 2px;
    }

    .font-usage {
      font-size: 11px;
      color: #64748b;
    }

    .footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-text {
      font-size: 11px;
      color: #94a3b8;
    }

    .footer-brand {
      font-size: 16px;
      font-weight: 600;
      color: #059669;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>DataStory Brand Guide</h1>
    </div>

    <!-- Typography -->
    <div class="font-section">
      <h2 class="section-title">Typography</h2>
      <div class="font-card">
        <div class="font-preview">Aa Bb Cc 123</div>
        <div class="font-name">Plus Jakarta Sans</div>
        <div class="font-usage">Body, UI, headings</div>
      </div>
    </div>

    <!-- Emerald -->
    <div class="section">
      <h2 class="section-title">Primary — Emerald</h2>
      <div class="color-row">
        <div class="color-item">
          <div class="color-swatch" style="background: #059669;"></div>
          <div class="color-hex">#059669</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #047857;"></div>
          <div class="color-hex">#047857</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #022c22;"></div>
          <div class="color-hex">#022c22</div>
        </div>
      </div>
    </div>

    <!-- Slate -->
    <div class="section">
      <h2 class="section-title">Neutrals — Slate</h2>
      <div class="color-row">
        <div class="color-item">
          <div class="color-swatch" style="background: #f8fafc; box-shadow: inset 0 0 0 1px #e2e8f0;"></div>
          <div class="color-hex">#f8fafc</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #e2e8f0;"></div>
          <div class="color-hex">#e2e8f0</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #64748b;"></div>
          <div class="color-hex">#64748b</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #475569;"></div>
          <div class="color-hex">#475569</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #0f172a;"></div>
          <div class="color-hex">#0f172a</div>
        </div>
      </div>
    </div>

    <!-- Base -->
    <div class="section">
      <h2 class="section-title">Base</h2>
      <div class="color-row" style="max-width: 260px;">
        <div class="color-item">
          <div class="color-swatch" style="background: #ffffff; box-shadow: inset 0 0 0 1px #e2e8f0; border-radius: 8px 0 0 8px;"></div>
          <div class="color-hex">#ffffff</div>
        </div>
        <div class="color-item">
          <div class="color-swatch" style="background: #000000; border-radius: 0 8px 8px 0;"></div>
          <div class="color-hex">#000000</div>
        </div>
      </div>
    </div>

    <div class="footer">
      <span class="footer-text">Neil Thomas • 2025</span>
      <span class="footer-brand">DataStory</span>
    </div>
  </div>
</body>
</html>
